name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  smoke:
    name: No-secrets smoke
    runs-on: ubuntu-latest

    env:
      CI: 'true'
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@11.1.3 --activate

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Test
        run: corepack pnpm test

      - name: Format check
        run: corepack pnpm format

      - name: Secret-pattern scan
        shell: bash
        run: |
          set -euo pipefail

          # Build patterns dynamically to avoid matching this workflow file itself.
          p_openai="OPENAI_""API_KEY"
          p_anthropic="ANTHROPIC_""API_KEY"
          p_gemini="GEMINI_""API_KEY"
          p_secret="SECRET_""KEY"
          p_password="PASSWORD""="
          p_token="TOKEN""="
          p_bearer="Bear""er "
          p_openai_token="(^|[^A-Za-z0-9_])sk""-[A-Za-z0-9]{20,}"
          p_rsa_private="BEGIN RSA ""PRIVATE KEY"
          p_private="BEGIN ""PRIVATE KEY"

          pattern="(${p_openai}|${p_anthropic}|${p_gemini}|${p_secret}|${p_password}|${p_token}|${p_bearer}|${p_openai_token}|${p_rsa_private}|${p_private})"

          matches="$(git grep -l -I -E "$pattern" -- . ':!docs/**' ':!.env.example' || true)"

          if [ -n "$matches" ]; then
            echo "Potential secret-like pattern found in tracked files:"
            echo "$matches"
            echo "Secret scan reports filenames only; inspect locally before committing."
            exit 1
          fi

      - name: Forbidden scope scan
        shell: bash
        run: |
          set -euo pipefail

          forbidden_paths=(
            "db"
            "migrations"
            "prisma"
            "drizzle"
            "apps/web/src/routes"
            "apps/web/src/api"
            "apps/worker/src/jobs"
            "packages/core/src/tasks"
            "packages/core/src/access"
            "packages/ai/src/provider"
          )

          for path in "${forbidden_paths[@]}"; do
            if [ -e "$path" ]; then
              echo "Forbidden Stage 2.1 path exists: $path"
              exit 1
            fi
          done

          forbidden_files=(
            "docker-compose.yml"
            "Dockerfile"
            ".env"
          )

          for file in "${forbidden_files[@]}"; do
            if [ -e "$file" ]; then
              echo "Forbidden Stage 2.1 file exists: $file"
              exit 1
            fi
          done

          if find . \
            -path './node_modules' -prune -o \
            -path './.git' -prune -o \
            -path './packages/db/migrations' -prune -o \
            -name '*.sql' -print | grep -q .; then
            echo "SQL files are forbidden outside packages/db/migrations at Stage 2.1."
            exit 1
          fi

          if find packages/core/src -maxdepth 1 -type f \( -name 'tasks*' -o -name 'access*' \) -print 2>/dev/null | grep -q .; then
            echo "Premature core feature files are forbidden at Stage 2.1."
            exit 1
          fi

          if find packages/ai/src -maxdepth 1 -type f -name 'provider*' -print 2>/dev/null | grep -q .; then
            echo "Premature AI provider files are forbidden at Stage 2.1."
            exit 1
          fi
